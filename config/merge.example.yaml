# GMD Merge Configuration Example
# Save as .gmdrc or gmd.config.yaml in your project root

master: /home/user/project-master
slave: /home/user/project-slave

output:
  format: color      # color, plain, json, silent
  progress: true
  report: ./gmd-merge-report.json

backup:
  enabled: true
  directory: ./backups
  keep: 10           # Number of backups to retain

merge:
  direction: master-to-slave  # master-to-slave, slave-to-master, bidirectional
  mode: interactive           # interactive, auto, safe
  categories:                 # Which file types to process
    - missing               # Files in master but not in slave
    - update                # Files different between master and slave
    # - exists              # Files identical in both (usually skipped)
  excludes:
    - "*.tmp"
    - ".git/"
    - ".gitignore"
    - "node_modules/"
    - "__pycache__/"
    - "*.pyc"
    - "*.log"
    - ".env"
    - ".venv/"
  dry_run: false
